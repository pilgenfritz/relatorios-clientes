<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Relatórios Meta Ads</title>
  <style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #F0F2F5;
  color: #1C1E21;
  min-height: 100vh;
}

/* ===== Navbar ===== */
.navbar {
  background: #1877F2;
  color: #fff;
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.navbar .brand { font-size: 18px; font-weight: 700; }
.navbar-actions { display: flex; gap: 10px; align-items: center; }

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .15s;
  text-decoration: none;
  white-space: nowrap;
}
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-primary { background: #1877F2; color: #fff; }
.btn-primary:hover:not(:disabled) { background: #166FE5; }
.btn-secondary { background: #E4E6EB; color: #1C1E21; text-decoration: none; }
.btn-secondary:hover { background: #D8DADF; }
.btn-success { background: #42B72A; color: #fff; }
.btn-success:hover:not(:disabled) { background: #36A420; }
.btn-outline { background: transparent; color: #1877F2; border: 1.5px solid #1877F2; }
.btn-outline:hover:not(:disabled) { background: #E7F0FD; }
.btn-white { background: rgba(255,255,255,.2); color: #fff; border: 1.5px solid rgba(255,255,255,.4); }
.btn-white:hover:not(:disabled) { background: rgba(255,255,255,.3); }
.btn-sm { padding: 5px 11px; font-size: 13px; }
.btn-block { width: 100%; justify-content: center; }

/* ===== Container ===== */
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px 20px;
}

/* ===== Summary Bar ===== */
.summary-bar {
  display: flex;
  gap: 16px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.summary-item {
  background: #fff;
  border-radius: 12px;
  padding: 16px 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
  flex: 1;
  min-width: 180px;
}
.summary-item .label { font-size: 12px; color: #65676B; text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }
.summary-item .value { font-size: 24px; font-weight: 700; margin-top: 4px; }
.summary-item .value.text-blue { color: #1877F2; }
.summary-item .value.text-red { color: #FA3E3E; }
.summary-item .value.text-green { color: #42B72A; }
.summary-item .value.text-orange { color: #F5A623; }

/* ===== Cards Grid ===== */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 20px;
}

/* ===== Client Card ===== */
.client-card {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
  overflow: hidden;
  transition: box-shadow .15s;
  display: flex;
  flex-direction: column;
}
.client-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.15); }
.client-card.border-danger { border-left: 4px solid #FA3E3E; }
.client-card.border-warning { border-left: 4px solid #F5A623; }
.client-card.border-healthy { border-left: 4px solid #42B72A; }
.client-card.border-postpaid { border-left: 4px solid #BEC3C9; }

.card-header {
  padding: 16px 18px 12px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 1px solid #F0F2F5;
}
.card-header .client-name { font-size: 15px; font-weight: 700; }
.card-header .account-id { font-size: 11px; color: #65676B; font-family: monospace; margin-top: 2px; }
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
}
.badge-prepaid { background: #E7F0FD; color: #1877F2; }
.badge-postpaid { background: #F0F2F5; color: #65676B; }

/* ===== Balance Section ===== */
.card-balance {
  padding: 12px 18px;
  border-bottom: 1px solid #F0F2F5;
}
.balance-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.balance-label { font-size: 12px; color: #65676B; }
.balance-value { font-size: 18px; font-weight: 700; }
.balance-value.healthy { color: #42B72A; }
.balance-value.warning { color: #F5A623; }
.balance-value.danger { color: #FA3E3E; }
.balance-value.postpaid { color: #65676B; }

.progress-bar-wrap {
  background: #E4E6EB;
  border-radius: 20px;
  height: 8px;
  overflow: hidden;
  margin-bottom: 6px;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 20px;
  transition: width .4s ease;
}
.progress-bar-fill.healthy { background: #42B72A; }
.progress-bar-fill.warning { background: #F5A623; }
.progress-bar-fill.danger { background: #FA3E3E; }

.balance-details {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #65676B;
}

/* ===== Weekly Section ===== */
.card-weekly {
  padding: 12px 18px;
  border-bottom: 1px solid #F0F2F5;
  flex: 1;
}
.card-weekly .section-label {
  font-size: 11px;
  color: #65676B;
  text-transform: uppercase;
  letter-spacing: .04em;
  font-weight: 600;
  margin-bottom: 8px;
}
.metrics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 16px;
}
.metric-item { display: flex; flex-direction: column; }
.metric-item .metric-label { font-size: 11px; color: #65676B; }
.metric-item .metric-value { font-size: 14px; font-weight: 600; }

/* ===== Card Footer ===== */
.card-footer {
  padding: 12px 18px;
  display: flex;
  gap: 8px;
  align-items: center;
}
.card-footer .progress-info {
  flex: 1;
  font-size: 12px;
  color: #65676B;
}
.card-footer .progress-info.done { color: #2E7D32; font-weight: 600; }
.card-footer .progress-info.error { color: #C62828; font-weight: 600; }

/* ===== Loading ===== */
.loading-state {
  text-align: center;
  padding: 80px 20px;
  color: #65676B;
}
.loading-state .spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #E4E6EB;
  border-top-color: #1877F2;
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== Skeleton ===== */
.skeleton-card {
  background: #fff;
  border-radius: 12px;
  padding: 18px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}
.skeleton-line {
  height: 14px;
  background: linear-gradient(90deg, #E4E6EB 25%, #F0F2F5 50%, #E4E6EB 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 4px;
  margin-bottom: 10px;
}
.skeleton-line.w60 { width: 60%; }
.skeleton-line.w40 { width: 40%; }
.skeleton-line.w80 { width: 80%; }
.skeleton-line.h24 { height: 24px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ===== Toast ===== */
#toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: #1C1E21;
  color: #fff;
  padding: 12px 18px;
  border-radius: 8px;
  font-size: 14px;
  box-shadow: 0 4px 12px rgba(0,0,0,.25);
  animation: slide-in .2s ease;
  max-width: 320px;
}
.toast.success { background: #2E7D32; }
.toast.error   { background: #C62828; }
@keyframes slide-in {
  from { transform: translateX(40px); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}

/* ===== Error State ===== */
.error-banner {
  background: #FFF0F0;
  border: 1px solid #FFCDD2;
  color: #B71C1C;
  border-radius: 8px;
  padding: 14px 18px;
  margin-bottom: 20px;
  font-size: 14px;
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .cards-grid { grid-template-columns: 1fr; }
  .summary-bar { flex-direction: column; }
  .navbar { padding: 0 16px; }
  .container { padding: 16px 12px; }
}
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="brand">Dashboard Meta Ads</div>
    <div class="navbar-actions">
      <button class="btn btn-white btn-sm" id="btn-refresh" onclick="loadDashboard()">Atualizar</button>
      <button class="btn btn-success" id="btn-run-all" onclick="runAll()">Gerar Todos</button>
    </div>
  </nav>

  <div class="container">
    <!-- Error banner -->
    <div id="error-banner" class="error-banner" style="display:none"></div>

    <!-- Summary bar -->
    <div class="summary-bar" id="summary-bar" style="display:none">
      <div class="summary-item">
        <div class="label">Total de Contas</div>
        <div class="value text-blue" id="sum-total">0</div>
      </div>
      <div class="summary-item">
        <div class="label">Saldo Baixo</div>
        <div class="value text-red" id="sum-danger">0</div>
      </div>
      <div class="summary-item">
        <div class="label">Saldo OK</div>
        <div class="value text-green" id="sum-healthy">0</div>
      </div>
      <div class="summary-item">
        <div class="label">Gasto Semanal Total</div>
        <div class="value text-blue" id="sum-spend">R$ 0</div>
      </div>
    </div>

    <!-- Cards grid -->
    <div class="cards-grid" id="cards-grid">
      <!-- Skeleton loading -->
      <div class="skeleton-card"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div><div class="skeleton-line h24"></div><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div></div>
      <div class="skeleton-card"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div><div class="skeleton-line h24"></div><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div></div>
      <div class="skeleton-card"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div><div class="skeleton-line h24"></div><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div></div>
      <div class="skeleton-card"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div><div class="skeleton-line h24"></div><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div></div>
      <div class="skeleton-card"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div><div class="skeleton-line h24"></div><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div></div>
      <div class="skeleton-card"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div><div class="skeleton-line h24"></div><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
var BASE = window.location.pathname.replace(/\/$/, '');
var pollingIntervals = {};
var dashboardData = [];

function formatCurrency(val) {
  if (val === null || val === undefined) return '—';
  return 'R$ ' + Number(val).toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function formatNumber(val) {
  if (!val) return '0';
  return Number(val).toLocaleString('pt-BR');
}

function showToast(message, type) {
  var c = document.getElementById("toast-container");
  var t = document.createElement("div");
  t.className = "toast " + (type || "info");
  t.textContent = message;
  c.appendChild(t);
  setTimeout(function() { t.remove(); }, 4000);
}

function renderCard(acc) {
  var borderClass = 'border-' + (acc.balance_status || 'postpaid');
  var badgeClass = acc.is_prepaid ? 'badge-prepaid' : 'badge-postpaid';
  var badgeText = acc.payment_label || (acc.is_prepaid ? 'Pré-pago' : 'Pós-pago');

  // Balance section
  var balanceHtml = '';
  if (acc.is_prepaid && acc.balance !== null) {
    var statusClass = acc.balance_status || 'healthy';
    var pct = acc.budget > 0 ? Math.min(100, Math.round((acc.balance / acc.budget) * 100)) : 0;
    balanceHtml =
      '<div class="card-balance">' +
        '<div class="balance-row">' +
          '<span class="balance-label">Saldo Atual</span>' +
          '<span class="balance-value ' + statusClass + '">' + formatCurrency(acc.balance) + '</span>' +
        '</div>' +
        '<div class="progress-bar-wrap">' +
          '<div class="progress-bar-fill ' + statusClass + '" style="width:' + pct + '%"></div>' +
        '</div>' +
        '<div class="balance-details">' +
          '<span>Alerta: ' + formatCurrency(acc.threshold) + '</span>' +
          '<span>Orçamento: ' + formatCurrency(acc.budget) + '/mês</span>' +
        '</div>' +
      '</div>';
  } else {
    balanceHtml =
      '<div class="card-balance">' +
        '<div class="balance-row">' +
          '<span class="balance-label">Saldo</span>' +
          '<span class="balance-value postpaid">Pós-pago</span>' +
        '</div>' +
        (acc.budget > 0 ?
          '<div class="balance-details"><span>Orçamento: ' + formatCurrency(acc.budget) + '/mês</span></div>' : '') +
      '</div>';
  }

  // Weekly metrics
  var w = acc.weekly || {};
  var weeklyHtml =
    '<div class="card-weekly">' +
      '<div class="section-label">Últimos 7 dias</div>' +
      '<div class="metrics-grid">' +
        '<div class="metric-item"><span class="metric-label">Gasto</span><span class="metric-value">' + formatCurrency(w.spend) + '</span></div>' +
        '<div class="metric-item"><span class="metric-label">Impressões</span><span class="metric-value">' + formatNumber(w.impressions) + '</span></div>' +
        (w.result_label ?
          '<div class="metric-item"><span class="metric-label">' + w.result_label + '</span><span class="metric-value">' + formatNumber(w.results) + '</span></div>' +
          '<div class="metric-item"><span class="metric-label">Custo/' + w.result_label.replace(/s$/, '') + '</span><span class="metric-value">' + formatCurrency(w.cost_per_result) + '</span></div>'
        : '') +
      '</div>' +
    '</div>';

  // Error state
  if (acc.error) {
    balanceHtml = '<div class="card-balance"><div class="balance-row"><span class="balance-label" style="color:#C62828">Erro ao carregar dados</span></div></div>';
    weeklyHtml = '';
  }

  return '<div class="client-card ' + borderClass + '" data-account-id="' + acc.account_id + '">' +
    '<div class="card-header">' +
      '<div><div class="client-name">' + acc.client_name + '</div><div class="account-id">' + acc.account_id + '</div></div>' +
      '<span class="badge ' + badgeClass + '">' + badgeText + '</span>' +
    '</div>' +
    balanceHtml +
    weeklyHtml +
    '<div class="card-footer">' +
      '<div class="progress-info" id="progress-' + acc.account_id + '"></div>' +
      '<div style="display:flex;gap:8px">' +
        '<a class="btn btn-secondary btn-sm" href="https://adsmanager.facebook.com/adsmanager/manage/campaigns?act=' + acc.account_id.replace('act_', '') + '&business_id=3007766306108936" target="_blank" rel="noopener">Gerenciador</a>' +
        '<button class="btn btn-primary btn-sm" id="btn-' + acc.account_id + '" onclick="runAccount(\'' + acc.account_id + '\')">Enviar</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function renderDashboard(accounts) {
  dashboardData = accounts;
  var grid = document.getElementById('cards-grid');
  var summaryBar = document.getElementById('summary-bar');

  if (!accounts || accounts.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:#65676B;">Nenhuma conta encontrada.</div>';
    summaryBar.style.display = 'none';
    return;
  }

  // Summary counts
  var totalSpend = 0;
  var dangerCount = 0;
  var healthyCount = 0;

  accounts.forEach(function(acc) {
    var w = acc.weekly || {};
    totalSpend += (w.spend || 0);
    if (acc.balance_status === 'danger') dangerCount++;
    if (acc.balance_status === 'healthy') healthyCount++;
  });

  document.getElementById('sum-total').textContent = accounts.length;
  document.getElementById('sum-danger').textContent = dangerCount;
  document.getElementById('sum-healthy').textContent = healthyCount;
  document.getElementById('sum-spend').textContent = formatCurrency(totalSpend);
  summaryBar.style.display = 'flex';

  // Render cards
  var html = '';
  accounts.forEach(function(acc) { html += renderCard(acc); });
  grid.innerHTML = html;
}

function loadDashboard() {
  var btn = document.getElementById('btn-refresh');
  if (btn) btn.disabled = true;

  // Show skeleton
  var grid = document.getElementById('cards-grid');
  var skeletonHtml = '';
  for (var i = 0; i < 6; i++) {
    skeletonHtml += '<div class="skeleton-card"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div><div class="skeleton-line h24"></div><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div></div>';
  }
  grid.innerHTML = skeletonHtml;

  fetch(BASE + '/api/dashboard')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        document.getElementById('error-banner').textContent = 'Erro: ' + data.error;
        document.getElementById('error-banner').style.display = 'block';
        grid.innerHTML = '';
      } else {
        document.getElementById('error-banner').style.display = 'none';
        renderDashboard(data.accounts);
      }
      if (btn) btn.disabled = false;
    })
    .catch(function(e) {
      showToast('Erro ao carregar dashboard: ' + e.message, 'error');
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:#C62828;">Falha ao carregar dados. Tente atualizar.</div>';
      if (btn) btn.disabled = false;
    });
}

function updateCardProgress(accountId, jobId, progress) {
  var info = document.getElementById('progress-' + accountId);
  var runBtn = document.getElementById('btn-' + accountId);
  if (!info) return;

  if (progress.status === 'done') {
    info.className = 'progress-info done';
    info.textContent = 'Enviado!';
    if (runBtn) runBtn.disabled = false;
    stopPolling(jobId);
    showToast('Relatório de ' + (progress.client_name || accountId) + ' enviado!', 'success');
  } else if (progress.status === 'error') {
    info.className = 'progress-info error';
    info.textContent = 'Erro: ' + (progress.error_message || 'desconhecido');
    if (runBtn) runBtn.disabled = false;
    stopPolling(jobId);
    showToast('Erro em ' + (progress.client_name || accountId), 'error');
  } else {
    info.className = 'progress-info';
    info.textContent = progress.current_step || 'Processando...';
    if (runBtn) runBtn.disabled = true;
  }
}

function startPolling(accountId, jobId) {
  if (pollingIntervals[jobId]) return;
  pollingIntervals[jobId] = setInterval(function() {
    fetch(BASE + '/progress/' + jobId)
      .then(function(r) { return r.json(); })
      .then(function(data) { updateCardProgress(accountId, jobId, data); })
      .catch(function(e) { console.error('Polling error:', e); });
  }, 2000);
}

function stopPolling(jobId) {
  clearInterval(pollingIntervals[jobId]);
  delete pollingIntervals[jobId];
}

function runAccount(accountId) {
  var runBtn = document.getElementById('btn-' + accountId);
  var info = document.getElementById('progress-' + accountId);
  if (runBtn) runBtn.disabled = true;
  if (info) { info.className = 'progress-info'; info.textContent = 'Iniciando...'; }

  fetch(BASE + '/run/' + accountId, { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        showToast('Erro: ' + data.error, 'error');
        if (runBtn) runBtn.disabled = false;
        if (info) { info.className = 'progress-info error'; info.textContent = data.error; }
        return;
      }
      startPolling(accountId, data.job_id);
    })
    .catch(function(e) {
      showToast('Falha: ' + e.message, 'error');
      if (runBtn) runBtn.disabled = false;
    });
}

function runAll() {
  var btn = document.getElementById('btn-run-all');
  if (btn) btn.disabled = true;

  fetch(BASE + '/run/all', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        showToast('Erro: ' + data.error, 'error');
        if (btn) btn.disabled = false;
        return;
      }
      showToast(data.job_ids.length + ' envios iniciados!', 'success');
      data.job_ids.forEach(function(jobId) {
        var parts = jobId.split('_');
        var tsIdx = -1;
        for (var i = parts.length - 1; i >= 0; i--) {
          if (/^\d{10,}$/.test(parts[i])) { tsIdx = i; break; }
        }
        var accountId = parts.slice(0, tsIdx).join('_');
        startPolling(accountId, jobId);
      });
      if (btn) btn.disabled = false;
    })
    .catch(function(e) {
      showToast('Falha: ' + e.message, 'error');
      if (btn) btn.disabled = false;
    });
}

// Load on page load
loadDashboard();
  </script>
</body>
</html>
