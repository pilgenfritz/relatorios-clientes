<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Relatórios Meta Ads</title>
  <style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #F0F2F5;
  color: #1C1E21;
  min-height: 100vh;
}

/* ===== Navbar ===== */
.navbar {
  background: #1877F2;
  color: #fff;
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.navbar .brand { font-size: 18px; font-weight: 700; }
.navbar-actions { display: flex; gap: 10px; align-items: center; }

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .15s;
  text-decoration: none;
  white-space: nowrap;
}
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-primary { background: #1877F2; color: #fff; }
.btn-primary:hover:not(:disabled) { background: #166FE5; }
.btn-secondary { background: #E4E6EB; color: #1C1E21; text-decoration: none; }
.btn-secondary:hover { background: #D8DADF; }
.btn-success { background: #42B72A; color: #fff; }
.btn-success:hover:not(:disabled) { background: #36A420; }
.btn-white { background: rgba(255,255,255,.2); color: #fff; border: 1.5px solid rgba(255,255,255,.4); }
.btn-white:hover:not(:disabled) { background: rgba(255,255,255,.3); }
.btn-sm { padding: 5px 11px; font-size: 13px; }

/* ===== Container ===== */
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px 20px;
}

/* ===== Platform Tabs ===== */
.platform-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  border-bottom: 1px solid #E4E6EB;
}
.tab-btn {
  background: transparent;
  border: none;
  padding: 10px 18px;
  font-size: 14px;
  font-weight: 600;
  color: #65676B;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color .15s, border-color .15s;
}
.tab-btn:hover { color: #1877F2; }
.tab-btn.active {
  color: #1877F2;
  border-bottom-color: #1877F2;
}
.text-blue { color: #1877F2; }
.text-red { color: #FA3E3E; }
.text-green { color: #42B72A; }
.text-orange { color: #F5A623; }

/* ===== Cards List (horizontal stacked) ===== */
.cards-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ===== Client Card ===== */
.client-card {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
  overflow: hidden;
  display: flex;
  flex-direction: row;
  transition: box-shadow .15s;
}
.client-card:hover { box-shadow: 0 3px 14px rgba(0,0,0,.13); }
.client-card.border-danger  { border-left: 4px solid #FA3E3E; }
.client-card.border-warning { border-left: 4px solid #F5A623; }
.client-card.border-healthy { border-left: 4px solid #42B72A; }
.client-card.border-postpaid { border-left: 4px solid #BEC3C9; }

/* ===== Left Panel ===== */
.card-left {
  width: 270px;
  min-width: 270px;
  border-right: 1px solid #F0F2F5;
  display: flex;
  flex-direction: column;
  padding: 16px;
  gap: 12px;
}
.client-name { font-size: 15px; font-weight: 700; line-height: 1.3; }
.account-id  { font-size: 11px; color: #65676B; font-family: monospace; margin-top: 2px; }

.badge {
  display: inline-block;
  padding: 2px 9px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
}
.badge-prepaid  { background: #E7F0FD; color: #1877F2; }
.badge-postpaid { background: #F0F2F5; color: #65676B; }

.balance-block {}
.balance-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.balance-label { font-size: 12px; color: #65676B; }
.balance-value { font-size: 17px; font-weight: 700; }
.balance-value.healthy  { color: #42B72A; }
.balance-value.warning  { color: #F5A623; }
.balance-value.danger   { color: #FA3E3E; }
.balance-value.postpaid { color: #65676B; }

.progress-bar-wrap { background: #E4E6EB; border-radius: 20px; height: 7px; overflow: hidden; margin-bottom: 5px; }
.progress-bar-fill { height: 100%; border-radius: 20px; transition: width .4s ease; }
.progress-bar-fill.healthy  { background: #42B72A; }
.progress-bar-fill.warning  { background: #F5A623; }
.progress-bar-fill.danger   { background: #FA3E3E; }

.balance-details { display: flex; justify-content: space-between; font-size: 11px; color: #65676B; }

.card-actions {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: auto;
}
.progress-info {
  font-size: 12px;
  color: #65676B;
  min-height: 16px;
}
.progress-info.done  { color: #2E7D32; font-weight: 600; }
.progress-info.error { color: #C62828; font-weight: 600; }

/* ===== Right Panel ===== */
.card-right {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
}

.card-right-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid #F0F2F5;
  gap: 12px;
}
.period-label { font-size: 12px; color: #65676B; font-weight: 600; }
.period-select {
  padding: 4px 10px;
  border: 1px solid #CED0D4;
  border-radius: 6px;
  font-size: 13px;
  background: #fff;
  cursor: pointer;
  color: #1C1E21;
}
.period-select:focus { outline: none; border-color: #1877F2; }

/* ===== Campaign Groups ===== */
.campaigns-container { padding: 8px 0; flex: 1; }

.campaign-type-group { padding: 8px 16px; }
.campaign-type-group + .campaign-type-group { border-top: 1px solid #F0F2F5; }

.type-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.type-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.type-dot.MSG       { background: #1877F2; }
.type-dot.IG        { background: #8B5CF6; }
.type-dot.SITE      { background: #0EA5E9; }
.type-dot.ECOMMERCE { background: #F97316; }
.type-dot.LEAD      { background: #42B72A; }
.type-dot.OTHER     { background: #BEC3C9; }

.type-label-text {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: #65676B;
}

.campaign-row {
  display: grid;
  grid-template-columns: 1fr 110px 130px 110px;
  gap: 8px;
  align-items: center;
  padding: 5px 0;
  font-size: 13px;
}
.campaign-row + .campaign-row { border-top: 1px dashed #F0F2F5; }

.camp-name {
  color: #1C1E21;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.camp-metric {
  text-align: right;
  color: #1C1E21;
}
.camp-metric .num { font-weight: 600; }
.camp-metric .lbl { font-size: 11px; color: #65676B; display: block; }
.camp-spend { text-align: right; font-weight: 600; color: #1C1E21; }

/* ===== Performance Flag ===== */
.perf-flag {
  display: inline-block;
  width: 9px;
  height: 9px;
  border-radius: 50%;
  margin-right: 5px;
  vertical-align: middle;
  flex-shrink: 0;
}
.perf-flag.green  { background: #42B72A; }
.perf-flag.yellow { background: #F5C842; }
.perf-flag.orange { background: #F97316; }
.perf-flag.red    { background: #FA3E3E; }
.perf-flag.none   { display: none; }

/* ===== Campaign loading states ===== */
.campaigns-loading {
  padding: 20px 16px;
  color: #65676B;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.mini-spinner {
  width: 16px; height: 16px;
  border: 2px solid #E4E6EB;
  border-top-color: #1877F2;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

.campaigns-empty {
  padding: 20px 16px;
  color: #65676B;
  font-size: 13px;
  font-style: italic;
}

/* ===== Skeleton ===== */
.skeleton-card {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
  height: 120px;
}
.skeleton-line {
  height: 13px;
  background: linear-gradient(90deg, #E4E6EB 25%, #F0F2F5 50%, #E4E6EB 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 4px;
  margin-bottom: 10px;
}
.skeleton-line.w60 { width: 60%; }
.skeleton-line.w40 { width: 40%; }
.skeleton-line.w80 { width: 80%; }
.skeleton-line.h20 { height: 20px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ===== Toast ===== */
#toast-container {
  position: fixed; bottom: 24px; right: 24px; z-index: 999;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  background: #1C1E21; color: #fff;
  padding: 12px 18px; border-radius: 8px; font-size: 14px;
  box-shadow: 0 4px 12px rgba(0,0,0,.25);
  animation: slide-in .2s ease; max-width: 320px;
}
.toast.success { background: #2E7D32; }
.toast.error   { background: #C62828; }
@keyframes slide-in { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ===== Error Banner ===== */
.error-banner {
  background: #FFF0F0; border: 1px solid #FFCDD2; color: #B71C1C;
  border-radius: 8px; padding: 14px 18px; margin-bottom: 20px; font-size: 14px;
}

/* ===== Responsive ===== */
@media (max-width: 900px) {
  .client-card { flex-direction: column; }
  .card-left { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid #F0F2F5; }
  .campaign-row { grid-template-columns: 1fr 90px 100px; }
  .camp-spend { display: none; }
}
@media (max-width: 600px) {
  .platform-tabs { gap: 0; }
  .tab-btn { padding: 10px 14px; }
  .navbar { padding: 0 14px; }
  .container { padding: 14px 10px; }
  .campaign-row { grid-template-columns: 1fr 90px; }
  .camp-metric:last-of-type { display: none; }
}
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="brand">Clientes FTZ Marketing</div>
    <div class="navbar-actions">
      <button class="btn btn-white btn-sm" id="btn-refresh" onclick="loadDashboard()">Atualizar</button>
      <button class="btn btn-success" id="btn-run-all" onclick="runAll()" disabled title="Envio de relatórios temporariamente desativado">Gerar Todos</button>
    </div>
  </nav>

  <div class="container">
    <div id="error-banner" class="error-banner" style="display:none"></div>

    <div class="platform-tabs">
      <button class="tab-btn active" data-platform="meta" onclick="switchPlatform('meta')">Meta Ads</button>
      <button class="tab-btn" data-platform="google" onclick="switchPlatform('google')">Google Ads</button>
    </div>

    <div class="cards-list" id="cards-list">
      <div class="skeleton-card"><div class="skeleton-line w60 h20"></div><div class="skeleton-line w40"></div><div class="skeleton-line w80"></div></div>
      <div class="skeleton-card"><div class="skeleton-line w60 h20"></div><div class="skeleton-line w40"></div><div class="skeleton-line w80"></div></div>
      <div class="skeleton-card"><div class="skeleton-line w60 h20"></div><div class="skeleton-line w40"></div><div class="skeleton-line w80"></div></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
var BASE = window.location.pathname.replace(/\/$/, '');
var pollingIntervals = {};
var dashboardData = [];
var currentPlatform = 'meta';

// ─── Tabs ───────────────────────────────────────────────────
function switchPlatform(p) {
  if (currentPlatform === p) return;
  currentPlatform = p;
  document.querySelectorAll('.tab-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.platform === p);
  });
  loadDashboard();
}

// ─── Formatadores ───────────────────────────────────────────
function fmtCur(val) {
  if (val === null || val === undefined) return '—';
  return 'R$ ' + Number(val).toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}
function fmtNum(val) {
  if (!val) return '0';
  return Number(val).toLocaleString('pt-BR');
}

// ─── Toast ──────────────────────────────────────────────────
function showToast(msg, type) {
  var c = document.getElementById('toast-container');
  var t = document.createElement('div');
  t.className = 'toast ' + (type || '');
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function() { t.remove(); }, 4000);
}

// ─── Renderiza left panel (info + saldo + botões) ────────────
function renderCardLeft(acc) {
  var badgeClass = acc.is_prepaid ? 'badge-prepaid' : 'badge-postpaid';
  var badgeText  = acc.is_prepaid ? 'Pré-pago' : 'Pós-pago';

  var balanceHtml = '';
  if (acc.is_prepaid && acc.balance !== null) {
    var sc = acc.balance_status || 'healthy';
    var pct = acc.budget > 0 ? Math.min(100, Math.round((acc.balance / acc.budget) * 100)) : 0;
    balanceHtml =
      '<div class="balance-block">' +
        '<div class="balance-row">' +
          '<span class="balance-label">Saldo atual</span>' +
          '<span class="balance-value ' + sc + '">' + fmtCur(acc.balance) + '</span>' +
        '</div>' +
        '<div class="progress-bar-wrap"><div class="progress-bar-fill ' + sc + '" style="width:' + pct + '%"></div></div>' +
        '<div class="balance-details">' +
          '<span>Alerta: ' + fmtCur(acc.threshold) + '</span>' +
          '<span>Orç: ' + fmtCur(acc.budget) + '/mês</span>' +
        '</div>' +
      '</div>';
  } else {
    balanceHtml =
      '<div class="balance-block">' +
        '<div class="balance-row">' +
          '<span class="balance-label">Saldo</span>' +
          '<span class="balance-value postpaid">Pós-pago</span>' +
        '</div>' +
        (acc.budget > 0 ? '<div class="balance-details"><span>Orç: ' + fmtCur(acc.budget) + '/mês</span></div>' : '') +
      '</div>';
  }

  var adsUrl = 'https://adsmanager.facebook.com/adsmanager/manage/campaigns?act=' +
    acc.account_id.replace('act_', '') + '&business_id=3007766306108936';

  return '<div class="card-left">' +
    '<div>' +
      '<div class="client-name">' + acc.client_name + '</div>' +
      '<div class="account-id">' + acc.account_id + '</div>' +
      '<span class="badge ' + badgeClass + '" style="margin-top:6px;display:inline-block">' + badgeText + '</span>' +
    '</div>' +
    balanceHtml +
    '<div class="progress-info" id="progress-' + acc.account_id + '"></div>' +
    '<div class="card-actions">' +
      '<a class="btn btn-secondary btn-sm" href="' + adsUrl + '" target="_blank" rel="noopener">Gerenciador</a>' +
      '<button class="btn btn-primary btn-sm" id="btn-' + acc.account_id + '" onclick="runAccount(\'' + acc.account_id + '\')" disabled title="Envio de relatórios temporariamente desativado">Enviar</button>' +
    '</div>' +
  '</div>';
}

// ─── Renderiza right panel (filtro + campanhas) ──────────────
function renderCardRight(acc) {
  return '<div class="card-right">' +
    '<div class="card-right-header">' +
      '<span class="period-label">Período</span>' +
      '<select class="period-select" onchange="loadCampaigns(\'' + acc.account_id + '\', this.value, \'' + (acc.campaign_filter || '') + '\')">' +
        '<option value="7">Últimos 7 dias</option>' +
        '<option value="14">Últimos 14 dias</option>' +
        '<option value="30">Últimos 30 dias</option>' +
      '</select>' +
    '</div>' +
    '<div class="campaigns-container" id="campaigns-' + acc.account_id + '">' +
      '<div class="campaigns-loading"><div class="mini-spinner"></div>Carregando campanhas...</div>' +
    '</div>' +
  '</div>';
}

// ─── Renderiza grupos de campanhas no painel direito ─────────
var TYPE_ORDER = ['MSG', 'IG', 'SITE', 'ECOMMERCE', 'LEAD', 'OTHER'];
var TYPE_LABELS = {
  MSG:       'Mensagem',
  IG:        'Tráfego no Perfil',
  SITE:      'Tráfego no Site',
  ECOMMERCE: 'Vendas',
  LEAD:      'Leads',
  OTHER:     'Outras'
};

function renderCampaigns(accountId, campaigns) {
  var container = document.getElementById('campaigns-' + accountId);
  if (!container) return;

  if (!campaigns || campaigns.length === 0) {
    container.innerHTML = '<div class="campaigns-empty">Nenhuma campanha com investimento no período.</div>';
    return;
  }

  // Agrupa por tipo
  var groups = {};
  campaigns.forEach(function(c) {
    var t = c.campaign_type || 'OTHER';
    if (!groups[t]) groups[t] = [];
    groups[t].push(c);
  });

  var html = '';
  TYPE_ORDER.forEach(function(type) {
    if (!groups[type]) return;
    html += '<div class="campaign-type-group">';
    html += '<div class="type-header">' +
      '<div class="type-dot ' + type + '"></div>' +
      '<span class="type-label-text">' + (TYPE_LABELS[type] || type) + '</span>' +
    '</div>';

    groups[type].forEach(function(c) {
      var flag = perfFlag(type, c.cost_per_result);
      html += '<div class="campaign-row">' +
        '<div class="camp-name" title="' + c.campaign_name + '">' + c.campaign_name + '</div>' +
        '<div class="camp-metric">' +
          '<span class="num">' + fmtNum(c.result_value) + '</span>' +
          '<span class="lbl">' + c.result_label + '</span>' +
        '</div>' +
        '<div class="camp-metric">' +
          '<span class="num"><span class="perf-flag ' + flag + '"></span>' + fmtCur(c.cost_per_result) + '</span>' +
          '<span class="lbl">Custo/' + singularize(c.result_label) + '</span>' +
        '</div>' +
        '<div class="camp-spend">' + fmtCur(c.spend) + '</div>' +
      '</div>';
    });

    html += '</div>';
  });

  container.innerHTML = html;
}

// ─── Flag de desempenho por custo/resultado ──────────────────
function perfFlag(type, costPerResult) {
  var c = parseFloat(costPerResult);
  if (isNaN(c) || c <= 0) return 'none';

  if (type === 'MSG') {
    if (c >= 10)  return 'red';
    if (c >= 6)   return 'yellow';
    return 'green';
  }

  if (type === 'IG') {
    if (c >= 1.00) return 'red';
    if (c >= 0.40) return 'orange';
    if (c < 0.15)  return 'green';
    return 'yellow';  // >= 0.15 e < 0.40
  }

  if (type === 'SITE') {
    if (c > 0.60)  return 'red';
    if (c >= 0.26) return 'orange';
    return 'green';  // < 0.26
  }

  return 'none';
}

function singularize(label) {
  var map = {
    'Mensagens':        'mensagem',
    'Visitas ao Perfil':'visita',
    'Cliques':          'clique',
    'Compras':          'compra',
    'Leads':            'lead',
  };
  return map[label] || label;
}

// ─── Carrega campanhas de uma conta ─────────────────────────
function loadCampaigns(accountId, days, filter) {
  var container = document.getElementById('campaigns-' + accountId);
  if (!container) return;
  container.innerHTML = '<div class="campaigns-loading"><div class="mini-spinner"></div>Carregando campanhas...</div>';

  var url = BASE + '/api/campaigns/' + accountId + '?days=' + (days || 7);
  if (filter) url += '&filter=' + encodeURIComponent(filter);

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        container.innerHTML = '<div class="campaigns-empty" style="color:#C62828">Erro: ' + data.error + '</div>';
        return;
      }
      renderCampaigns(accountId, data.campaigns);
    })
    .catch(function(e) {
      container.innerHTML = '<div class="campaigns-empty" style="color:#C62828">Falha ao carregar.</div>';
    });
}

// ─── Render card completo ────────────────────────────────────
function renderCard(acc) {
  var borderClass = 'border-' + (acc.balance_status || 'postpaid');
  return '<div class="client-card ' + borderClass + '" data-account-id="' + acc.account_id + '">' +
    renderCardLeft(acc) +
    renderCardRight(acc) +
  '</div>';
}

// ─── Google Ads — flags de performance CPC ───────────────────
function googleCpcFlag(cpc) {
  if (!cpc || cpc <= 0) return '';
  if (cpc < 1)  return 'green';
  if (cpc <= 3) return 'orange';
  return 'red';
}

// ─── Google Ads — left panel ─────────────────────────────────
function renderGoogleCardLeft(acc) {
  var sc = acc.spend_status || 'healthy';
  var pct = acc.budget > 0 ? Math.min(100, Math.round((acc.spend_mtd / acc.budget) * 100)) : 0;
  var spendBlock =
    '<div class="balance-block">' +
      '<div class="balance-row">' +
        '<span class="balance-label">Gasto no mês</span>' +
        '<span class="balance-value ' + sc + '">' + fmtCur(acc.spend_mtd) + '</span>' +
      '</div>' +
      (acc.budget > 0
        ? '<div class="progress-bar-wrap"><div class="progress-bar-fill ' + sc + '" style="width:' + pct + '%"></div></div>' +
          '<div class="balance-details">' +
            '<span>' + pct + '% do orçamento</span>' +
            '<span>Orç: ' + fmtCur(acc.budget) + '/mês</span>' +
          '</div>'
        : '<div class="balance-details"><span>Sem orçamento configurado</span></div>') +
    '</div>';

  var adsUrl = 'https://ads.google.com/aw/campaigns?__c=' + acc.google_customer_id;

  return '<div class="card-left">' +
    '<div>' +
      '<div class="client-name">' + acc.client_name + '</div>' +
      '<div class="account-id">' + acc.google_customer_id + '</div>' +
      '<span class="badge badge-postpaid" style="margin-top:6px;display:inline-block">Google Ads</span>' +
    '</div>' +
    spendBlock +
    '<div class="card-actions">' +
      '<a class="btn btn-secondary btn-sm" href="' + adsUrl + '" target="_blank" rel="noopener">Gerenciador</a>' +
      '<button class="btn btn-primary btn-sm" disabled title="Envio de relatórios temporariamente desativado">Enviar</button>' +
    '</div>' +
  '</div>';
}

// ─── Google Ads — right panel ────────────────────────────────
function renderGoogleCardRight(acc) {
  return '<div class="card-right">' +
    '<div class="card-right-header">' +
      '<span class="period-label">Período</span>' +
      '<select class="period-select" onchange="loadGoogleCampaigns(\'' + acc.google_customer_id + '\', this.value, \'' + (acc.campaign_filter || '') + '\')">' +
        '<option value="7">Últimos 7 dias</option>' +
        '<option value="14">Últimos 14 dias</option>' +
        '<option value="30">Últimos 30 dias</option>' +
      '</select>' +
    '</div>' +
    '<div class="campaigns-container" id="gcampaigns-' + acc.google_customer_id + '">' +
      '<div class="campaigns-loading"><div class="mini-spinner"></div>Carregando campanhas...</div>' +
    '</div>' +
  '</div>';
}

// ─── Google Ads — render campanhas ───────────────────────────
function renderGoogleCampaigns(customerId, campaigns) {
  var container = document.getElementById('gcampaigns-' + customerId);
  if (!container) return;

  if (!campaigns || campaigns.length === 0) {
    container.innerHTML = '<div class="campaigns-empty">Nenhuma campanha com investimento no período.</div>';
    return;
  }

  var html = '<div class="campaign-type-group">';
  campaigns.forEach(function(c) {
    var flag = googleCpcFlag(c.cpc);
    var hasConv = c.campaign_type === 'GOOGLE_CONVERSAO' && c.conversions != null;
    html += '<div class="campaign-row">' +
      '<div class="camp-name" title="' + c.campaign_name + '">' + c.campaign_name + '</div>' +
      '<div class="camp-metric">' +
        '<span class="num">' + fmtNum(c.clicks) + '</span>' +
        '<span class="lbl">Cliques</span>' +
      '</div>' +
      '<div class="camp-metric">' +
        '<span class="num"><span class="perf-flag ' + flag + '"></span>' + fmtCur(c.cpc) + '</span>' +
        '<span class="lbl">CPC</span>' +
      '</div>' +
      '<div class="camp-spend">' + fmtCur(c.spend) + '</div>' +
      (hasConv
        ? '<div class="camp-metric" style="grid-column:1 / -1;border-top:1px dashed #F0F2F5;padding-top:6px;margin-top:2px">' +
            '<span class="num">' + fmtNum(c.conversions) + ' conversões</span>' +
            '<span class="lbl">Custo: ' + fmtCur(c.cost_per_conversion) + '</span>' +
          '</div>'
        : '') +
    '</div>';
  });
  html += '</div>';

  container.innerHTML = html;
}

// ─── Google Ads — carrega campanhas ──────────────────────────
function loadGoogleCampaigns(customerId, days, filter) {
  var container = document.getElementById('gcampaigns-' + customerId);
  if (!container) return;
  container.innerHTML = '<div class="campaigns-loading"><div class="mini-spinner"></div>Carregando campanhas...</div>';

  var url = BASE + '/api/campaigns/google/' + customerId + '?days=' + (days || 7);
  if (filter) url += '&filter=' + encodeURIComponent(filter);

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        container.innerHTML = '<div class="campaigns-empty" style="color:#C62828">Erro: ' + data.error + '</div>';
        return;
      }
      renderGoogleCampaigns(customerId, data.campaigns);
    })
    .catch(function(e) {
      container.innerHTML = '<div class="campaigns-empty" style="color:#C62828">Falha ao carregar.</div>';
    });
}

// ─── Google Ads — render card completo ───────────────────────
function renderGoogleCard(acc) {
  var borderClass = 'border-' + (acc.spend_status || 'healthy');
  return '<div class="client-card ' + borderClass + '" data-google-id="' + acc.google_customer_id + '">' +
    renderGoogleCardLeft(acc) +
    renderGoogleCardRight(acc) +
  '</div>';
}

// ─── Render dashboard completo ───────────────────────────────
function renderDashboard(accounts) {
  dashboardData = accounts;
  var list = document.getElementById('cards-list');

  if (!accounts || accounts.length === 0) {
    var emptyMsg = currentPlatform === 'google'
      ? 'Nenhum cliente com conta Google Ads configurada na planilha.'
      : 'Nenhuma conta encontrada.';
    list.innerHTML = '<div style="text-align:center;padding:60px;color:#65676B;">' + emptyMsg + '</div>';
    return;
  }

  var html = '';
  accounts.forEach(function(acc) {
    html += currentPlatform === 'google' ? renderGoogleCard(acc) : renderCard(acc);
  });
  list.innerHTML = html;

  // Carrega campanhas de todos os cards automaticamente
  accounts.forEach(function(acc) {
    if (currentPlatform === 'google') {
      loadGoogleCampaigns(acc.google_customer_id, 7, acc.campaign_filter || '');
    } else {
      loadCampaigns(acc.account_id, 7, acc.campaign_filter || '');
    }
  });
}

// ─── Carrega dados gerais (saldo, orçamento, resumo) ─────────
function loadDashboard() {
  var btn = document.getElementById('btn-refresh');
  if (btn) btn.disabled = true;

  var list = document.getElementById('cards-list');
  var skeletonHtml = '';
  for (var i = 0; i < 4; i++) {
    skeletonHtml += '<div class="skeleton-card"><div class="skeleton-line w60 h20"></div><div class="skeleton-line w40"></div><div class="skeleton-line w80"></div></div>';
  }
  list.innerHTML = skeletonHtml;

  var endpoint = currentPlatform === 'google' ? '/api/dashboard/google' : '/api/dashboard';

  fetch(BASE + endpoint)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        document.getElementById('error-banner').textContent = 'Erro: ' + data.error;
        document.getElementById('error-banner').style.display = 'block';
        list.innerHTML = '';
      } else {
        document.getElementById('error-banner').style.display = 'none';
        renderDashboard(data.accounts);
      }
      if (btn) btn.disabled = false;
    })
    .catch(function(e) {
      showToast('Erro ao carregar dashboard: ' + e.message, 'error');
      list.innerHTML = '<div style="text-align:center;padding:60px;color:#C62828;">Falha ao carregar. Tente atualizar.</div>';
      if (btn) btn.disabled = false;
    });
}

// ─── Progress polling ────────────────────────────────────────
function updateCardProgress(accountId, jobId, progress) {
  var info   = document.getElementById('progress-' + accountId);
  var runBtn = document.getElementById('btn-' + accountId);
  if (!info) return;

  if (progress.status === 'done') {
    info.className = 'progress-info done';
    info.textContent = 'Enviado!';
    if (runBtn) runBtn.disabled = false;
    stopPolling(jobId);
    showToast('Relatório de ' + (progress.client_name || accountId) + ' enviado!', 'success');
  } else if (progress.status === 'error') {
    info.className = 'progress-info error';
    info.textContent = 'Erro: ' + (progress.error_message || 'desconhecido');
    if (runBtn) runBtn.disabled = false;
    stopPolling(jobId);
    showToast('Erro em ' + (progress.client_name || accountId), 'error');
  } else {
    info.className = 'progress-info';
    info.textContent = progress.current_step || 'Processando...';
    if (runBtn) runBtn.disabled = true;
  }
}

function startPolling(accountId, jobId) {
  if (pollingIntervals[jobId]) return;
  pollingIntervals[jobId] = setInterval(function() {
    fetch(BASE + '/progress/' + jobId)
      .then(function(r) { return r.json(); })
      .then(function(data) { updateCardProgress(accountId, jobId, data); })
      .catch(function() {});
  }, 2000);
}

function stopPolling(jobId) {
  clearInterval(pollingIntervals[jobId]);
  delete pollingIntervals[jobId];
}

function runAccount(accountId) {
  var runBtn = document.getElementById('btn-' + accountId);
  var info   = document.getElementById('progress-' + accountId);
  if (runBtn) runBtn.disabled = true;
  if (info)   { info.className = 'progress-info'; info.textContent = 'Iniciando...'; }

  fetch(BASE + '/run/' + accountId, { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        showToast('Erro: ' + data.error, 'error');
        if (runBtn) runBtn.disabled = false;
        if (info)   { info.className = 'progress-info error'; info.textContent = data.error; }
        return;
      }
      startPolling(accountId, data.job_id);
    })
    .catch(function(e) {
      showToast('Falha: ' + e.message, 'error');
      if (runBtn) runBtn.disabled = false;
    });
}

function runAll() {
  var btn = document.getElementById('btn-run-all');
  if (btn) btn.disabled = true;

  fetch(BASE + '/run/all', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        showToast('Erro: ' + data.error, 'error');
        if (btn) btn.disabled = false;
        return;
      }
      showToast(data.job_ids.length + ' envios iniciados!', 'success');
      data.job_ids.forEach(function(jobId) {
        var parts = jobId.split('_');
        var tsIdx = -1;
        for (var i = parts.length - 1; i >= 0; i--) {
          if (/^\d{10,}$/.test(parts[i])) { tsIdx = i; break; }
        }
        var accountId = parts.slice(0, tsIdx).join('_');
        startPolling(accountId, jobId);
      });
      if (btn) btn.disabled = false;
    })
    .catch(function(e) {
      showToast('Falha: ' + e.message, 'error');
      if (btn) btn.disabled = false;
    });
}

loadDashboard();
  </script>
</body>
