<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Relatórios Meta Ads</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #F0F2F5;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-card {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,.1);
  padding: 40px;
  width: 100%;
  max-width: 400px;
  text-align: center;
}
.login-card h1 {
  font-size: 22px;
  color: #1877F2;
  margin-bottom: 8px;
}
.login-card p {
  color: #65676B;
  font-size: 14px;
  margin-bottom: 24px;
}
.login-card input[type="password"] {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid #CED0D4;
  border-radius: 8px;
  font-size: 16px;
  outline: none;
  transition: border-color .2s;
}
.login-card input[type="password"]:focus {
  border-color: #1877F2;
  box-shadow: 0 0 0 2px rgba(24,119,242,.2);
}
.login-card button {
  width: 100%;
  margin-top: 16px;
  padding: 12px;
  background: #1877F2;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background .2s;
}
.login-card button:hover { background: #166FE5; }
.error {
  background: #FEE2E2;
  color: #DC2626;
  padding: 10px 16px;
  border-radius: 8px;
  font-size: 14px;
  margin-bottom: 16px;
}
  </style>
</head>
<body>
  <div class="login-card">
    <h1>FTZ Marketing</h1>
    <p>Acesse o painel de relatórios</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <input type="password" name="password" placeholder="Digite a senha" autofocus required>
      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
